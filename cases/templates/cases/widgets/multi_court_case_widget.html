<div id="{{ widget_id }}_container" class="multiple-input-container">
    {% for item in parsed_values %}
    <div class="input-row" draggable="true">
        <span class="drag-handle">⋮⋮</span>
        <select class="court-select">
            {% for court_id, court_name in court_choices %}
            <option value="{{ court_id }}" {% if item.court_id == court_id %}selected{% endif %}>{{ court_name }}</option>
            {% endfor %}
        </select>
        <textarea class="text-input auto-resize court-case-number" placeholder="Case number">{{ item.case_number }}</textarea>
        <button type="button" class="btn btn-sm btn-danger remove-input">
            <i class="fas fa-times"></i>
        </button>
    </div>
    {% endfor %}
    <div style="margin-bottom: 8px;">
        <button type="button" id="{{ widget_id }}_add" class="btn btn-sm btn-success add-widget-btn">
            <i class="fas fa-plus"></i> {{ button_label }}
        </button>
    </div>
</div>
<input type="hidden" name="{{ name }}" id="{{ widget_id }}" value="{{ values_json }}">

<script>
(function() {
    var courtChoices = {{ court_choices_json|safe }};
    var retryCount = 0;
    var maxRetries = 100; // Try for up to 5 seconds (100 * 50ms)
    
    function initWidget() {
        if (typeof window.initMultiCourtCaseWidget === 'function') {
            window.initMultiCourtCaseWidget(
                '{{ widget_id }}_container',
                '{{ widget_id }}',
                courtChoices,
                {
                    rowTemplate: function(choices) {
                        var options = choices.map(function(choice) {
                            return '<option value="' + choice[0] + '">' + choice[1] + '</option>';
                        }).join('');
                        return [
                            '<span class="drag-handle">⋮⋮</span>',
                            '<select class="court-select">' + options + '</select>',
                            '<textarea class="text-input auto-resize court-case-number" placeholder="Case number"></textarea>',
                            '<button type="button" class="btn btn-sm btn-danger remove-input">',
                            '<i class="fas fa-times"></i>',
                            '</button>'
                        ].join(' ');
                    }
                }
            );
        } else {
            retryCount++;
            if (retryCount < maxRetries) {
                // Function not loaded yet, retry after a short delay
                setTimeout(initWidget, 50);
            } else {
                console.error('[Court Case Widget] Failed to initialize after', maxRetries, 'attempts. widgets.js may not be loaded.');
            }
        }
    }
    
    // Check if DOM is already loaded
    if (document.readyState === 'loading') {
        // DOM is still loading, wait for DOMContentLoaded
        document.addEventListener('DOMContentLoaded', initWidget);
    } else {
        // DOM is already loaded, initialize immediately
        initWidget();
    }
})();
</script>
