# GitHub Actions workflow for daily PostgreSQL database backup to Cloudflare R2.
#
# This workflow:
# 1. Runs daily at 02:00 UTC via cron schedule
# 2. Dumps the PostgreSQL database using pg_dump
# 3. Compresses the dump with gzip
# 4. Uploads the compressed dump to the "jawafdehi-admin" Cloudflare R2 bucket
#
# Backups are stored at: backups/jawafdehi-<YYYY-MM-DD>.sql.gz
#
# Required environment secrets (GitHub Environment: "DB backup"):
#   DATABASE_URL          - PostgreSQL connection string (for example: postgresql://user:pass@host:port/db)
#   R2_ACCESS_KEY_ID      - Cloudflare R2 Access Key ID
#   R2_SECRET_ACCESS_KEY  - Cloudflare R2 Secret Access Key
#   R2_ACCOUNT_ID         - Cloudflare Account ID (used to build the R2 endpoint URL)

name: DB Backup

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: none

jobs:
  backup:
    name: Dump and upload database
    runs-on: ubuntu-latest
    environment: "DB backup"

    steps:
      - name: Install PostgreSQL 18 client and AWS CLI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg unzip

          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/keyrings/postgresql.gpg
          echo "deb [signed-by=/etc/apt/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(. /etc/os-release && echo \"$VERSION_CODENAME\")-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-18

          case "$(uname -m)" in
            x86_64)
              AWSCLI_ARCH="x86_64"
              ;;
            aarch64|arm64)
              AWSCLI_ARCH="aarch64"
              ;;
            *)
              echo "Unsupported architecture: $(uname -m)"
              exit 1
              ;;
          esac

          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-${AWSCLI_ARCH}.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          sudo ./aws/install --update

          pg_dump --version
          aws --version

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          BACKUP_FILE="jawafdehi-$(date -u +%Y-%m-%d).sql.gz"

          pg_dump \
            --dbname="$DATABASE_URL" \
            --no-owner \
            --no-privileges \
            --format=plain \
            | gzip > "$BACKUP_FILE"

          echo "BACKUP_FILE=$BACKUP_FILE" >> "$GITHUB_ENV"

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          aws s3 cp "$BACKUP_FILE" \
            "s3://jawafdehi-admin/backups/$BACKUP_FILE" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region auto
